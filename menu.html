<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pizza Express - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pizza Express 🍕</h1>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="about.html">À propos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="content">

    <div class="menu-section">
        <h3>Nos Pizzas 🍕</h3>

        <div class="grid">

            <div class="card">
                <img src="https://cdn.pixabay.com/photo/2023/11/22/08/22/pizza-8404974_1280.jpg" alt="Pizza Margherita">
                <span>Margherita</span>
            </div>

            <div class="card">
                <img src="https://thumbs.dreamstime.com/b/cheese-bread-pizza-background-4944389.jpg?w=992" alt="Pizza 4 Fromages">
                <span>4 Fromages</span>
            </div>

            <div class="card">
                <img src="https://pixabay.com/images/download/hungquach679png-pizza-7241179_1920.jpg" alt="Pizza Pepperoni">
                <span>Pepperoni</span>
            </div>

        </div>
    </div>


    <div class="menu-section">
        <h3>Nos Pâtes 🍝</h3>

        <div class="grid">

            <div class="card">
                <img src="images/pates-carbonara.jpg" alt="Pâtes Carbonara">
                <span>Carbonara</span>
            </div>

            <div class="card">
                <img src="images/pates-bolognaise.jpg" alt="Pâtes Bolognaise">
                <span>Bolognaise</span>
            </div>

            <div class="card">
                <img src="images/pates-pesto.jpg" alt="Pâtes au Pesto">
                <span>Au Pesto</span>
            </div>
        </div>
    </div>


    <div class="menu-section">
    <h3>Nos Boissons 🥤</h3>

    <div class="grid">

        <div class="card">
            <img src="images/boisson-eau.jpg" alt="Eau Minérale">
            <span>Eau Minérale</span>
        </div>

        <div class="card">
            <img src="images/boisson-icetea.jpg" alt="Ice Tea">
            <span>Ice Tea</span>
        </div>

        <div class="card">
            <img src="images/boisson-coca.jpg" alt="Coca Cola">
            <span>Coca Cola</span>
        </div>

    </div>
</div>

</section>
